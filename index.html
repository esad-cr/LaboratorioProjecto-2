<!-- Indica ao navegador que este é um documento HTML5 -->
<!DOCTYPE html>
<!-- Elemento raiz do documento. O atributo lang="pt-PT" informa que o conteúdo está em português.-->
<html lang="en">
    <head>
        <!-- Contém informações sobre o documento (meta-informações, título, links para CSS e scripts). -->
        <meta charset="UTF-8"><!-- Define a codificação para caracteres (acentuação correta) -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Torna o site responsivo em dispositivos móveis -->
        <title>Hello, World</title>
        <meta name="author" content="Miguel Carradas"/><!-- Define o autor do site -->
        <meta name="description" content="Your site structure is vital for users and SEO. Our complete guide will guide you through all the steps to create a sound site structure." /><!-- Descrição da página (ajuda no SEO) -->
    </head>
    <body>
        <!-- Contém tudo o que será exibido na página: textos, imagens, links, etc. -->
        <header>
        <!-- Representa o cabeçalho da página ou de uma seção. Contém títulos, logotipo, menus, etc. Deve haver apenas um H1 por página -->
            <h1>Meu Blog</h1>
            <nav>
            <!-- Define uma área de navegação, com links internos ou externos. -->
                <ul>
                    <li>
                        <a href="#home">Início</a>
                    </li>
                    <li>
                        <a href="#sobre">Sobre</a>
                    </li>
                    <li>
                        <a href="#contato">Contato</a>
                    </li>
                </ul>
            </nav>
        </header>
        <main>
        <!-- O conteúdo principal da página, exclusivo e central. Deve haver apenas um <main> por página. -->
            <h2>Artigo Principal</h2>
            <p>Conteúdo principal...</p>
            <article>
            <!-- Representa um conteúdo independente, como:artigos de um blog, notícias, comentários, fóruns, etc. -->
                <h2>Título do Artigo</h2>
                <p>Conteúdo do artigo...</p>
            </article>
            <section>
            <!-- Define uma seção temática do conteúdo. Agrupa conteúdos relacionados dentro do <main> ou <article>.-->
                <h2>Serviços</h2>
                <p>Descrição dos serviços.</p>
            </section>
            <aside>
            <!-- Representa um conteúdo complementar, como: Barras laterais, Caixas de anúncios e Biografia do autor -->
                <h2>Sobre o Autor</h2>
                <p>Breve biografia...</p>
            </aside>
        </main>
        <footer>
        <!-- Define o rodapé da página ou de uma seção. Contém informações como: Direitos de autor, contatos, links úteis e créditos -->
            <p>&copy; 2025 Meu Site</p>
        </footer>
    </body>
</html>
