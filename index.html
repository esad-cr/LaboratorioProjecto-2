<!-- Indica ao navegador que este é um documento HTML5 -->
<!DOCTYPE html>
<!-- Elemento raiz do documento. O atributo lang="pt-PT" informa que o conteúdo está em português.-->
<html lang="en">
    <head>
        <!-- Contém informações sobre o documento (meta-informações, título, links para CSS e scripts). -->
        <meta charset="UTF-8"><!-- Define a codificação para caracteres (acentuação correta) -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- Torna o site responsivo em dispositivos móveis -->
        <title>Hello, World</title>
        <meta name="author" content="Miguel Carradas"/><!-- Define o autor do site -->
        <meta name="description" content="Your site structure is vital for users and SEO. Our complete guide will guide you through all the steps to create a sound site structure." /><!-- Descrição da página (ajuda no SEO) -->
    </head>
    <body>
        <!-- Contém tudo o que será exibido na página: textos, imagens, links, etc. -->
        <h1>Hello, World!</h1>
        <p>My first site.</p>
    </body>
</html>
