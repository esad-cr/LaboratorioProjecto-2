<!DOCTYPE html>
<html lang="pt-PT">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Títulos e conteúdos</title>
        <meta name="author" content="Miguel Carradas"/>
        <meta name="description" content="O HTML foi criado inicialmente para estruturar e formatar textos. Por isso, dominar os elementos relacionados a textos é essencial para qualquer desenvolvedor web. Nesta seção, você aprenderá como utilizar títulos, parágrafos, quebras de linha, formatações, citações, abreviações, entre outros elementos fundamentais para a construção de conteúdo textual na web." />
    </head>
    <body>
        <!-- Títulos (<h1> a <h6>) Definem hierarquias de conteúdo. São extremamente importantes para SEO e acessibilidade. <h1> é o título mais importante e <h6> o menos. -->
        <h1>Título Principal</h1>
        <h2>Subtítulo</h2>
        <h3>Seção</h3>
        <h4>Subseção</h4>
        <h5>Detalhes</h5>
        <h6>Notas</h6>

        <!-- Parágrafos (<p>) Usado para blocos de texto corrido. -->
        <p>Este é um parágrafo. Ele contém um bloco de texto dentro da página HTML.</p>

    </body>
</html>
